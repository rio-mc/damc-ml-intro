experiment:
  seed: 42
  output_dir: outputs/easy_ml

data:
  path: data/curated-solubility-dataset.csv
  target_column: Solubility
  train_fraction: 0.70
  val_fraction: 0.15
  test_fraction: 0.15
  drop_missing: true
  metadata_columns: ["Name"]

features:
  columns:  # Directly refer to columns in the dataset
    - MolWt
    - MolLogP
    - TPSA

model:
  n_estimators: 80  # Number of trees in the forest, toggle by changing to values of 2^x
  max_depth: 5  # Maximum depth of the tree, toggle by changing to values of 2^x
  min_samples_leaf: 2  # Minimum number of samples required to be at a leaf node